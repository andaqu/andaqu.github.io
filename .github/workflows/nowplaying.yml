name: Update now playing

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nowplaying
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    # The Spotify secrets were added as *environment* secrets, so the job must
    # opt into that environment to read them.
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch top track from Spotify
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: node scripts/update-nowplaying.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/nowplaying.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update now playing"
          # Retry on push races: another run may have advanced the branch.
          # Keep our freshly generated file on conflict (it's the only file we touch).
          for i in 1 2 3; do
            if git push; then
              echo "Pushed."
              exit 0
            fi
            echo "Push rejected; rebasing onto latest and retrying ($i)..."
            git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"
          done
          echo "Failed to push after retries." >&2
          exit 1
